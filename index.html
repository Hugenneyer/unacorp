<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNA Corp · Oportunidades 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FFFFFF;--bg2:#FAFAFA;--surface:#F5F5F5;--surface2:#EFEFEF;
  --border:#E8E8E8;--border2:#D4D4D4;
  --text:#0A0A0A;--text2:#262626;--muted:#737373;--faint:#A3A3A3;
  --gold:#B8860B;--gold2:#9A6F00;--gold-glow:rgba(184,134,11,.08);
  --green:#16A34A;--amber:#D97706;
  --font-d:'Montserrat',sans-serif;
  --font-b:'Montserrat',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font-b);font-size:14px;font-weight:400;overflow-x:hidden;cursor:none}
::selection{background:var(--text);color:var(--bg)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--faint)}

/* CURSOR */
#cur{position:fixed;top:0;left:0;width:8px;height:8px;border-radius:50%;background:var(--text);pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .25s,height .25s,opacity .25s;mix-blend-mode:difference}
#cur-ring{position:fixed;top:0;left:0;width:40px;height:40px;border-radius:50%;border:1px solid rgba(0,0,0,.25);pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:border-color .3s;mix-blend-mode:difference}
body.hovering #cur{width:3px;height:3px;opacity:.6}

/* NOISE */
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");opacity:.5}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:22px 52px;background:linear-gradient(to bottom,rgba(255,255,255,.96),rgba(255,255,255,.7) 70%,rgba(255,255,255,0));backdrop-filter:blur(8px)}
.logo{font-family:var(--font-d);font-size:22px;font-weight:600;letter-spacing:5px;text-decoration:none;color:var(--text)}
.logo span{color:var(--gold)}
.filters{display:flex;gap:3px;background:rgba(0,0,0,.04);padding:4px;border-radius:999px;border:1px solid var(--border)}
.f-btn{border:none;background:transparent;font-family:var(--font-b);font-size:11px;font-weight:500;color:var(--muted);padding:7px 18px;border-radius:999px;cursor:pointer;letter-spacing:.5px;transition:all .2s}
.f-btn.active{background:var(--text);color:var(--bg)}
.f-btn:hover:not(.active){color:var(--text)}
.nav-right{font-size:10px;font-weight:500;color:var(--muted);letter-spacing:2.5px;text-transform:uppercase}

/* HERO */
.hero{min-height:100vh;display:flex;flex-direction:column;justify-content:flex-end;padding:52px;padding-bottom:56px;position:relative;overflow:hidden}
.hero-bg{position:absolute;inset:0;z-index:0}
.hero-bg img{width:100%;height:100%;object-fit:cover;opacity:.25;filter:grayscale(20%) contrast(1.05)}
.hero-bg::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,var(--bg) 30%,rgba(255,255,255,.5) 70%,transparent 100%)}
.hero-glow{position:absolute;top:-20%;left:-10%;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(184,134,11,.10) 0%,transparent 70%);pointer-events:none;animation:pulse 6s ease-in-out infinite;z-index:1}
@keyframes pulse{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}
.hero-num{position:absolute;right:52px;top:50%;transform:translateY(-50%);font-family:var(--font-d);font-size:clamp(160px,22vw,320px);font-weight:700;color:transparent;-webkit-text-stroke:1px rgba(0,0,0,.06);line-height:1;letter-spacing:-8px;pointer-events:none;user-select:none;z-index:1}
.hero-eyebrow{font-size:10px;font-weight:500;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:18px;opacity:0;animation:fadeUp .7s ease forwards .15s;position:relative;z-index:2}
.hero-title{font-family:var(--font-d);font-size:clamp(60px,9.5vw,132px);font-weight:200;line-height:.92;letter-spacing:-3px;margin-bottom:52px;opacity:0;animation:fadeUp .7s ease forwards .3s;position:relative;z-index:2}
.hero-title em{font-style:italic;color:var(--gold);font-weight:200}
.hero-stats{display:flex;gap:52px;align-items:flex-end;opacity:0;animation:fadeUp .7s ease forwards .5s;position:relative;z-index:2}
.stat{display:flex;flex-direction:column;gap:5px}
.stat-n{font-family:var(--font-d);font-size:52px;font-weight:300;line-height:1;letter-spacing:-1px}
.stat-l{font-size:9px;font-weight:500;letter-spacing:3px;text-transform:uppercase;color:var(--muted)}
.stat-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:5px;vertical-align:middle}
.hero-scroll{position:absolute;bottom:28px;right:52px;display:flex;align-items:center;gap:14px;font-size:9px;letter-spacing:2.5px;color:var(--muted);text-transform:uppercase;opacity:0;animation:fadeUp .7s ease forwards .8s;z-index:2}
.scroll-line{width:48px;height:1px;background:var(--gold)}

/* TICKER */
.ticker{border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:13px 0;overflow:hidden;white-space:nowrap;position:relative;z-index:1}
.ticker-inner{display:inline-flex;animation:ticker 35s linear infinite}
.ticker-item{display:inline-flex;align-items:center;gap:28px;padding:0 28px;font-family:var(--font-d);font-size:17px;font-weight:400;color:var(--muted)}
.ticker-item .sep{color:var(--gold);font-size:8px}

/* MAIN */
main{padding:0 52px 100px;position:relative;z-index:1}
.section-head{display:flex;align-items:baseline;justify-content:space-between;padding:56px 0 28px;border-bottom:1px solid var(--border);margin-bottom:36px}
.section-title{font-family:var(--font-d);font-size:36px;font-weight:300;letter-spacing:-1px}
.section-cnt{font-size:10px;font-weight:500;letter-spacing:3px;text-transform:uppercase;color:var(--muted)}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
@media(max-width:1100px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){.grid{grid-template-columns:1fr}}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:2px;overflow:hidden;cursor:pointer;transition:transform .35s,border-color .35s,box-shadow .35s;opacity:0;animation:fadeUp .55s ease forwards}
.card:hover{transform:translateY(-4px);border-color:var(--text);box-shadow:0 18px 40px rgba(0,0,0,.08),0 0 0 1px rgba(0,0,0,.06)}
.card-img{height:220px;background:var(--surface2);position:relative;overflow:hidden}
.card-img img{width:100%;height:100%;object-fit:cover;transition:transform .6s ease}
.card:hover .card-img img{transform:scale(1.07)}
.ph{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;background:linear-gradient(145deg,#F5F5F5,#EFEFEF)}
.ph-icon{font-size:26px;opacity:.2}
.ph-txt{font-size:8px;letter-spacing:2.5px;color:var(--faint);text-transform:uppercase}
.badge{position:absolute;top:12px;left:12px;font-size:8px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;padding:4px 11px;border-radius:999px}
.badge.pronto{background:#16A34A;color:#FFF;border:1px solid #16A34A;font-weight:700;box-shadow:0 1px 3px rgba(22,163,74,.25)}
.badge.obras{background:#D97706;color:#FFF;border:1px solid #D97706;font-weight:700;box-shadow:0 1px 3px rgba(217,119,6,.25)}
.tag{position:absolute;top:12px;right:12px;font-size:8px;font-weight:600;letter-spacing:1px;color:#fff;background:rgba(0,0,0,.7);padding:4px 10px;border-radius:2px;backdrop-filter:blur(8px)}
.img-count{position:absolute;bottom:10px;right:10px;font-size:8px;font-weight:600;color:#fff;background:rgba(0,0,0,.7);padding:3px 9px;border-radius:999px;backdrop-filter:blur(6px);letter-spacing:.5px}
.card-body{padding:18px 20px 20px}
.card-name{font-family:var(--font-d);font-size:15px;font-weight:600;line-height:1.25;margin-bottom:4px;letter-spacing:-.2px}
.card-addr{font-size:11px;color:var(--muted);margin-bottom:14px}
.divider{height:1px;background:var(--border);margin-bottom:14px}
.specs{display:flex;gap:18px;margin-bottom:14px}
.spec-v{font-size:13px;font-weight:500}
.spec-l{font-size:8px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-top:2px}
.card-foot{display:flex;align-items:center;justify-content:space-between;padding-top:12px;border-top:1px solid var(--border)}
.price{font-family:var(--font-d);font-size:17px;font-weight:600;color:var(--text);letter-spacing:-.3px}
.arrow-btn{width:30px;height:30px;border-radius:50%;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:13px;transition:all .25s}
.card:hover .arrow-btn{border-color:var(--gold);color:var(--gold);background:var(--gold-glow)}

/* ══ MODAL ══ */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(8px)}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg);border:1px solid var(--border);border-radius:6px;width:100%;max-width:940px;max-height:92vh;display:flex;flex-direction:column;transform:translateY(22px) scale(.97);transition:transform .38s cubic-bezier(.22,1,.36,1);overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.20)}
.overlay.open .modal{transform:translateY(0) scale(1)}

.m-topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 22px;border-bottom:1px solid var(--border);flex-shrink:0}
.m-breadcrumb{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
.m-close{width:30px;height:30px;border-radius:50%;background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;line-height:1}
.m-close:hover{background:var(--text);color:var(--bg);border-color:var(--text)}

.m-tabs{display:flex;border-bottom:1px solid var(--border);padding:0 22px;flex-shrink:0;position:sticky;top:0;background:var(--bg);z-index:10}
.m-tab{padding:14px 20px;font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;margin-bottom:-1px}
.m-tab.active{color:var(--text);border-bottom-color:var(--text)}
.m-tab:hover:not(.active){color:var(--text)}

.m-scroll{overflow-y:auto;flex:1}
.m-scroll::-webkit-scrollbar{width:3px}
.m-scroll::-webkit-scrollbar-thumb{background:var(--faint)}

.t-panel{display:none;padding:24px 22px}
.t-panel.active{display:block}

/* ── OVERVIEW ── */
.m-hero-img{height:340px;background:var(--surface);border-radius:2px;overflow:hidden;margin-bottom:22px;position:relative}
.m-hero-img img{width:100%;height:100%;object-fit:cover}
.m-hero-ph{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
.m-badge-row{display:flex;gap:8px;align-items:center;margin-bottom:10px}
.m-name{font-family:var(--font-d);font-size:28px;font-weight:300;line-height:1.15;margin-bottom:6px;letter-spacing:-1px}
.m-addr{font-size:12px;color:var(--muted);margin-bottom:2px}
.m-unit{font-size:11px;color:var(--faint);margin-bottom:20px}
.m-specs-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.m-spec{background:var(--surface);border:1px solid var(--border);border-radius:2px;padding:14px 16px}
.m-spec-l{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.m-spec-v{font-size:13px;font-weight:500}
.m-price-row{display:flex;align-items:center;justify-content:space-between;padding:24px 28px;background:linear-gradient(135deg,#0A0A0A 0%,#1A1A1A 100%);color:var(--bg);border-radius:6px;margin-bottom:16px;position:relative;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.12)}
.m-price-row::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:#B8860B}
.m-price-l{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.55);font-weight:600}
.m-price{font-family:var(--font-d);font-size:30px;font-weight:300;color:var(--bg);letter-spacing:-.5px;display:flex;align-items:baseline;gap:2px}
.m-price .currency{font-size:14px;font-weight:500;color:rgba(255,255,255,.65);margin-right:6px;letter-spacing:1px}
.m-cta{display:flex;gap:8px}
.btn-p{flex:1;padding:15px 22px;background:#0A0A0A;color:#FFF;font-family:var(--font-b);font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;border:none;border-radius:4px;cursor:pointer;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .25s ease;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.btn-p:not([style*='opacity']):hover{background:#262626;transform:translateY(-1px);box-shadow:0 6px 16px rgba(0,0,0,.18)}

.btn-s{padding:15px 20px;background:#FFF;border:1px solid var(--border2);color:var(--text);font-family:var(--font-b);font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;border-radius:4px;cursor:pointer;transition:all .25s;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-s:hover{border-color:var(--text);color:var(--text);background:var(--surface);transform:translateY(-1px)}

/* ── FOTOS ── */
.photo-label{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;margin-top:22px}
.photo-label:first-child{margin-top:0}
.photo-hero{height:420px;border-radius:2px;overflow:hidden;margin-bottom:8px;position:relative;background:var(--surface);cursor:zoom-in}
.photo-hero img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
.photo-hero:hover img{transform:scale(1.02)}
.photo-count{position:absolute;bottom:12px;right:12px;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);font-size:10px;font-weight:500;color:var(--text);padding:5px 14px;border-radius:999px}
.photo-nav{position:absolute;bottom:12px;left:12px;display:flex;gap:6px}
.p-nav-btn{width:30px;height:30px;border-radius:50%;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.1);color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s}
.p-nav-btn:hover{background:rgba(201,168,76,.3);border-color:var(--gold);color:var(--gold)}
.photo-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:4px}
.photo-thumb{height:80px;border-radius:2px;overflow:hidden;background:var(--surface2);cursor:pointer;border:2px solid transparent;transition:border-color .2s,transform .2s;position:relative}
.photo-thumb.active{border-color:var(--gold)}
.photo-thumb:hover{transform:scale(1.04)}
.photo-thumb img{width:100%;height:100%;object-fit:cover}
.photo-ph-sm{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:18px;opacity:.15}
.photo-hero-ph{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.photo-hero-ph .ph-icon{font-size:52px;opacity:.1}
.photo-hero-ph .ph-txt{font-size:9px;letter-spacing:2px;color:var(--faint)}

/* ── PLANTAS ── */
.plant-tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.p-tab{padding:7px 16px;font-size:10px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:var(--muted);background:var(--surface);border:1px solid var(--border);border-radius:999px;cursor:pointer;transition:all .2s}
.p-tab.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.plant-main{height:500px;background:var(--surface);border-radius:2px;overflow:hidden;display:flex;align-items:center;justify-content:center;position:relative;cursor:zoom-in}
.plant-main img{max-width:100%;max-height:100%;object-fit:contain;padding:24px;transition:transform .3s}
.plant-main:hover img{transform:scale(1.03)}
.plant-ph{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.plant-ph .ph-icon{font-size:52px;opacity:.1}
.plant-ph .ph-txt{font-size:9px;letter-spacing:2px;color:var(--faint);text-align:center;max-width:200px;line-height:1.6}
.plant-specs{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px}
.p-spec{text-align:center;padding:14px;background:var(--surface);border-radius:2px;border:1px solid var(--border)}
.p-spec-v{font-family:var(--font-d);font-size:22px;font-weight:600}
.p-spec-l{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-top:4px}

/* ── MAPA ── */
.map-address{background:var(--surface);border:1px solid var(--border);border-radius:2px;padding:18px 20px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:14px}
.map-addr-label{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.map-addr-val{font-family:var(--font-d);font-size:20px;font-weight:600}
.map-addr-sub{font-size:11px;color:var(--muted);margin-top:2px}
.map-open-btn{padding:10px 18px;background:transparent;border:1px solid var(--border2);color:var(--gold);font-family:var(--font-b);font-size:10px;font-weight:500;letter-spacing:1px;text-transform:uppercase;border-radius:2px;text-decoration:none;white-space:nowrap;transition:all .2s}
.map-open-btn:hover{background:var(--gold-glow);border-color:var(--gold)}
.map-wrap{border-radius:2px;overflow:hidden;border:1px solid var(--border);margin-bottom:18px;position:relative;height:360px}
.map-frame{width:100%;height:100%;border:none;display:block;filter:grayscale(15%) contrast(1.02)}
.poi-section-label{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.poi-list{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.poi{display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--surface);border:1px solid var(--border);border-radius:2px;transition:border-color .2s}
.poi:hover{border-color:var(--border2)}
.poi-icon{font-size:16px;width:26px;text-align:center;flex-shrink:0}
.poi-info{flex:1}
.poi-name{font-size:11px;font-weight:500}
.poi-dist{font-size:9px;color:var(--muted);margin-top:1px}
.poi-badge{font-size:8px;font-weight:600;color:var(--bg);background:var(--text);padding:3px 9px;border-radius:999px;white-space:nowrap;letter-spacing:.5px}


.m-builder{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:16px 20px;margin-bottom:16px;display:flex;align-items:center;gap:16px}
.m-builder-info{flex:1}
.m-builder-label{font-size:8px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:6px}
.m-builder-name{font-size:13px;font-weight:600;color:var(--text);letter-spacing:.2px}
.m-builder-logo{height:48px;max-width:140px;width:auto;object-fit:contain;background:#FFF;border-radius:4px;padding:6px 10px;border:1px solid var(--border)}
.m-builder-logo-placeholder{height:48px;width:140px;background:repeating-linear-gradient(135deg,var(--surface2),var(--surface2) 6px,#E8E8E8 6px,#E8E8E8 12px);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;font-weight:600;border:1px solid var(--border)}

/* FOOTER */
footer{border-top:1px solid var(--border);padding:28px 52px;display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1}
.f-logo{font-family:var(--font-d);font-size:18px;font-weight:600;letter-spacing:4px}
.f-logo span{color:var(--gold)}
.f-meta{font-size:10px;color:var(--muted)}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.no-res{grid-column:1/-1;text-align:center;padding:80px;color:var(--muted);font-size:13px;display:none}

/* LIGHTBOX */
.lbox{position:fixed;inset:0;background:rgba(0,0,0,.97);z-index:500;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.lbox.open{opacity:1;pointer-events:all}
.lbox img{max-width:90vw;max-height:88vh;object-fit:contain;border-radius:2px}
.lbox-close{position:absolute;top:20px;right:24px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s}
.lbox-close:hover{background:rgba(255,255,255,.18)}
.lbox-nav{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);display:flex;gap:10px}
.lbox-nbtn{padding:8px 20px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:#fff;font-size:16px;border-radius:2px;cursor:pointer;transition:background .2s}
.lbox-nbtn:hover{background:rgba(201,168,76,.2);border-color:var(--gold);color:var(--gold)}
.lbox-cnt{position:absolute;bottom:36px;left:50%;transform:translateX(-50%);font-size:11px;color:rgba(255,255,255,.4);letter-spacing:1px;pointer-events:none}
</style>

/* ──────────── RENDER CARDS ──────────── */
function render(f) {
  const grid = document.getElementById('grid');
  grid.querySelectorAll('.card').forEach(c=>c.remove());
  const items = DATA.filter(d=>f==='all'||d.status===f);
  document.getElementById('cnt').textContent = items.length+(items.length!==1?' imóveis':' imóvel');
  items.forEach((d,i)=>{
    const idx = DATA.indexOf(d);
    const thumb = d.fotos&&d.fotos.length
      ?`<img src="${d.fotos[0]}" alt="${d.nome}" loading="lazy">`
      :`<div class="ph"><div class="ph-icon">🏙</div><div class="ph-txt">Sem foto</div></div>`;
    const stLbl = d.status==='pronto'?'Pronto':'Em Obras · '+d.entrega;
    const extras=[d.mobiliado?'Mobiliado':'',d.deposito?'+Dep.':''].filter(Boolean).join(' · ');
    const c=document.createElement('div');
    c.className='card';
    c.style.animationDelay=(i*.07)+'s';
    c.innerHTML=`
      <div class="card-img">
        ${thumb}
        <div class="badge ${d.status}">${stLbl}</div>
        <div class="tag">${d.tipo}${extras?' · '+extras:''}</div>
        ${d.fotos&&d.fotos.length>1?`<div class="img-count">📷 ${d.fotos.length}</div>`:''}
      </div>
      <div class="card-body">
        <div class="card-name">${d.nome}</div>
        <div class="card-addr">${d.bairro} · ${d.endereco}</div>
        <div class="divider"></div>
        <div class="specs">
          <div><div class="spec-v">${d.metragem}</div><div class="spec-l">Área</div></div>
          <div><div class="spec-v">${d.dorms}</div><div class="spec-l">Dorms</div></div>
          <div><div class="spec-v">${d.vaga}</div><div class="spec-l">Garagem</div></div>
        </div>
        <div class="card-foot">
          <div class="price">R$ ${d.valor}</div>
          <div class="arrow-btn">→</div>
        </div>
      </div>`;
    c.addEventListener('click',()=>openModal(idx));
    c.addEventListener('mouseenter',()=>document.body.classList.add('hovering'));
    c.addEventListener('mouseleave',()=>document.body.classList.remove('hovering'));
    grid.appendChild(c);
  });
  document.getElementById('noRes').style.display=items.length?'none':'block';
}

/* ──────────── MODAL ──────────── */
let _d=null,_fi=0,_lfi=0;

function openModal(idx){
  _d=DATA[idx]; _fi=0;
  document.getElementById('mBread').textContent=_d.bairro+' · '+_d.nome;
  buildOverview();
  buildFotos(0);
  buildPlantas(0);
  buildMapa();
  switchTab('overview');
  document.getElementById('ov').classList.add('open');
  document.getElementById('mScroll').scrollTop=0;
}
function closeModal(){document.getElementById('ov').classList.remove('open');}
document.getElementById('ov').addEventListener('click',e=>{if(e.target.id==='ov')closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLbox()||closeModal();});

document.querySelectorAll('.m-tab').forEach(t=>{
  t.addEventListener('click',()=>switchTab(t.dataset.t));
});
function switchTab(name){
  document.querySelectorAll('.m-tab').forEach(t=>t.classList.toggle('active',t.dataset.t===name));
  document.querySelectorAll('.t-panel').forEach(p=>p.classList.toggle('active',p.id==='t-'+name));
  document.getElementById('mScroll').scrollTop=0;
}

/* OVERVIEW */
function buildOverview(){
  const d=_d;
  const hImg=d.fotos&&d.fotos.length
    ?`<img src="${d.fotos[0]}" alt="${d.nome}">`
    :`<div class="m-hero-ph"><div class="ph-icon" style="font-size:52px;opacity:.1">🏙</div></div>`;
  const stLbl=d.status==='pronto'?'Pronto para Morar':'Em Obras · Entrega '+d.entrega;
  const mLink=`https://maps.google.com/?q=${encodeURIComponent(d.mapQuery)}`;
  document.getElementById('t-overview').innerHTML=`
    <div class="m-hero-img">${hImg}</div>
    <div class="m-badge-row"><span class="badge ${d.status}" style="position:static;display:inline-block">${stLbl}</span></div>
    <div class="m-name">${d.nome}</div>
    <div class="m-addr">${d.endereco} · ${d.bairro}</div>
    <div class="m-unit">${d.unidade}</div>
    <div class="m-builder">
      <div class="m-builder-info">
        <div class="m-builder-label">Incorporação e Construção</div>
        <div class="m-builder-name">${d.incorporadora||'A definir'}</div>
      </div>
      ${d.incorporadoraLogo?`<img src="${d.incorporadoraLogo}" alt="${d.incorporadora}" class="m-builder-logo">`:`<div class="m-builder-logo-placeholder">Logo</div>`}
    </div>
    <div class="m-specs-grid">
      <div class="m-spec"><div class="m-spec-l">Metragem</div><div class="m-spec-v">${d.metragem}${d.deposito?' + Dep.':''}</div></div>
      <div class="m-spec"><div class="m-spec-l">Dormitórios</div><div class="m-spec-v">${d.dorms}</div></div>
      <div class="m-spec"><div class="m-spec-l">Garagem</div><div class="m-spec-v">${d.vaga}</div></div>
      <div class="m-spec"><div class="m-spec-l">Tipo</div><div class="m-spec-v">${d.tipo}</div></div>
      <div class="m-spec"><div class="m-spec-l">Mobiliado</div><div class="m-spec-v">${d.mobiliado?'Sim':'Não'}</div></div>
      <div class="m-spec"><div class="m-spec-l">Entrega</div><div class="m-spec-v">${d.entrega}</div></div>
    </div>
    <div class="m-price-row">
      <div class="m-price-l">Valor da Unidade</div>
      <div class="m-price"><span class="currency">R$</span>${d.valor}</div>
    </div>
    <div class="m-cta">
      <a href="${d.driveLink||'#'}" target="_blank" class="btn-p" style="${!d.driveLink?'opacity:.45;pointer-events:none;cursor:not-allowed;background:#525252':''}" title="${d.driveLink?'Abrir catálogo no Google Drive':'Link não cadastrado'}">📁 Catálogo no Drive</a>
      <a href="${mLink}" target="_blank" class="btn-s">📍 Abrir no Maps</a>
      <button class="btn-s" onclick="closeModal()">Fechar</button>
    </div>`;
}

/* FOTOS */
function buildFotos(active){
  const d=_d; _fi=active;
  const fotos=d.fotos&&d.fotos.length?d.fotos:[];
  const heroHTML=fotos.length
    ?`<img src="${fotos[active]}" alt="Foto ${active+1}" id="fHeroImg">
      <div class="photo-count">${active+1} / ${fotos.length}</div>
      <div class="photo-nav">
        <button class="p-nav-btn" onclick="fotoNav(-1)">←</button>
        <button class="p-nav-btn" onclick="fotoNav(1)">→</button>
      </div>`
    :`<div class="photo-hero-ph"><div class="ph-icon">📷</div><div class="ph-txt">Adicione URLs de fotos no campo "fotos" do DATA</div></div>`;
  const thumbs=fotos.length
    ?fotos.map((f,i)=>`<div class="photo-thumb ${i===active?'active':''}" onclick="buildFotos(${i})"><img src="${f}" alt="Foto ${i+1}" loading="lazy"></div>`).join('')
    :Array(5).fill(`<div class="photo-thumb"><div class="photo-ph-sm">📷</div></div>`).join('');
  document.getElementById('t-fotos').innerHTML=`
    <div class="photo-label">Galeria de Fotos</div>
    <div class="photo-hero" id="fHero" onclick="${fotos.length?`openLbox(${active})`:''}">
      ${heroHTML}
    </div>
    <div class="photo-grid" id="thumbRow">${thumbs}</div>`;
}
window.fotoNav=function(dir){
  const fotos=_d.fotos||[];
  if(!fotos.length)return;
  _fi=(_fi+dir+fotos.length)%fotos.length;
  buildFotos(_fi);
};

/* PLANTAS */
function buildPlantas(active){
  const d=_d;
  const plantas=d.plantas&&d.plantas.length?d.plantas:[];
  const mainHTML=plantas.length
    ?`<img src="${plantas[active].img}" alt="${plantas[active].label}">`
    :`<div class="plant-ph"><div class="ph-icon">📐</div><div class="ph-txt">Adicione URLs de plantas no campo "plantas" do DATA</div></div>`;
  const tabsHTML=plantas.length
    ?plantas.map((p,i)=>`<div class="p-tab ${i===active?'active':''}" onclick="buildPlantas(${i})">${p.label}</div>`).join('')
    :`<div class="p-tab active">Planta Tipo</div>`;
  document.getElementById('t-plantas').innerHTML=`
    <div class="photo-label">Plantas da Unidade</div>
    <div class="plant-tabs">${tabsHTML}</div>
    <div class="plant-main" id="plantMain" onclick="${plantas.length?`openLboxImg('${plantas[active].img}')`:''}">${mainHTML}</div>
    <div class="plant-specs">
      <div class="p-spec"><div class="p-spec-v">${d.metragem}</div><div class="p-spec-l">Área Privativa</div></div>
      <div class="p-spec"><div class="p-spec-v">${d.dorms}</div><div class="p-spec-l">Dormitórios</div></div>
      <div class="p-spec"><div class="p-spec-v">${d.vaga}</div><div class="p-spec-l">Garagem</div></div>
    </div>`;
}

/* MAPA */
function buildMapa(){
  const d=_d;
  const q=encodeURIComponent(d.mapQuery);
  const mLink=`https://maps.google.com/?q=${q}`;
  const embed=`https://maps.google.com/maps?q=${q}&output=embed&z=16`;
  const poisHTML=(d.pois||[]).map(p=>`
    <div class="poi">
      <div class="poi-icon">${p.icon}</div>
      <div class="poi-info"><div class="poi-name">${p.nome}</div><div class="poi-dist">${p.dist}</div></div>
      <div class="poi-badge">${p.dist}</div>
    </div>`).join('');
  document.getElementById('t-mapa').innerHTML=`
    <div class="photo-label" style="margin-top:0">Localização</div>
    <div class="map-address">
      <div>
        <div class="map-addr-label">Endereço Completo</div>
        <div class="map-addr-val">${d.endereco}</div>
        <div class="map-addr-sub">${d.bairro} · São Paulo – SP</div>
      </div>
      <a href="${mLink}" target="_blank" class="map-open-btn">Abrir no Maps →</a>
    </div>
    <div class="map-wrap">
      <iframe class="map-frame" src="${embed}" allowfullscreen loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
    </div>
    ${d.pois&&d.pois.length?`<div class="poi-section-label">Pontos de Interesse</div><div class="poi-list">${poisHTML}</div>`:''}`;
}

/* LIGHTBOX */
let _lfotos=[],_lfi2=0;
function openLbox(idx){
  _lfotos=_d.fotos||[]; _lfi2=idx;
  document.getElementById('lbox-img').src=_lfotos[idx];
  document.getElementById('lbox').classList.add('open');
}
window.openLboxImg=function(src){
  _lfotos=[src];_lfi2=0;
  document.getElementById('lbox-img').src=src;
  document.getElementById('lbox').classList.add('open');
};
window.closeLbox=function(){
  const el=document.getElementById('lbox');
  el.classList.remove('open');
  return true;
};
window.lboxNav=function(dir){
  if(!_lfotos.length)return;
  _lfi2=(_lfi2+dir+_lfotos.length)%_lfotos.length;
  document.getElementById('lbox-img').src=_lfotos[_lfi2];
};
document.getElementById('lbox').addEventListener('click',e=>{if(e.target.id==='lbox')closeLbox();});

/* TICKER */
const tEl=document.getElementById('ticker');
const titems=DATA.map(d=>`<span class="ticker-item">${d.nome}<span class="sep">◆</span>${d.bairro}</span>`);
tEl.innerHTML=[...titems,...titems].join('');

/* FILTERS */
document.querySelectorAll('.f-btn').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.f-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    render(b.dataset.f);
  });
});

/* CURSOR */
const cur=document.getElementById('cur'),ring=document.getElementById('cur-ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cur.style.left=mx+'px';cur.style.top=my+'px';});
(function loop(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(loop);})();
document.querySelectorAll('a,button,.card,.m-tab,.photo-thumb,.p-tab,.poi').forEach(el=>{
  el.addEventListener('mouseenter',()=>document.body.classList.add('hovering'));
  el.addEventListener('mouseleave',()=>document.body.classList.remove('hovering'));
});

/* INIT */
document.getElementById('dt').textContent=new Date().toLocaleDateString('pt-BR');
render('all');
</script>
</body>
</html>
